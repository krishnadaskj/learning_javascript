<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function generatepassword(length,includelowercase,includeuppercase,includenumber,includesymbol){
            const lowercasecharrs="abcdefghijklmnopqrstuvwxyz";
            const uppercasechars="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const numberchars="0123456789";
            const symbolchars="!@#$%^^&*()";

            let allowedchars="";
            let password="";

            allowedchars+=includelowercase?lowercasecharrs:"";
            allowedchars+=includeuppercase?uppercasechars:"";
            allowedchars+=includenumber?numberchars:"";
            allowedchars+=includesymbol?symbolchars:"";
            if(length<=0){
                return`(password length must be atleast 1)`;
            }
            if(allowedchars.length===0){
                return`(At least 1 set of character must need to be selected)`;

            }

            for(let i=0;i<length;i++){
                const randomIndex=Math.floor(Math.random()*allowedchars.length);
                password+=allowedchars(randomIndex);
            }
            return'';
        }
        const passwordlength=12;
        const includelowercase=true;
        const includeuppercase=true;
        const includenumber=true;
        const includesymbol=true;

        const password=generatepassword(passwordlength,
                                        includelowercase,
                                        includeuppercase,
                                        includenumber,
                                        includesymbol);
        console.log(`Generated password:${password}`);

    </script>
</body>
</html>
