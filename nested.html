<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="dem"></p>
    <script>
        let text=""
        loop1:for(let j=1;j<10;j++){
            loop2:for(let i=1;i<10;i++){
                if(i==3){break loop1;}
                text+=i+"<br>";
            }
        }
        document.getElementById('dem').innerHTML=text;
    </script>
</body>
</html>
