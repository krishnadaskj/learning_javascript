<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #container{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
        }

        button{
            color: white;
            background-color: hsl(240, 40%, 50%);
            padding: 10px 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background-color: hsl(240, 40%, 60%);
        }
        button:active{
            background-color: hsl(240, 40%, 70%);
        }
        input{
            font-size: 2rem;
            text-align: center;
            width: 150px;
            font-weight: bold;
        }

        #diceresult{
            margin: 25px;
        }
        #diceimage img{
            width: 150px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Dice Roller</h1>
        <label># of Dice:</label>
        <input type="number" id="numofdice"min="1"value="1">
        <button onclick="rolldice()">Roll Dice</button>
        <div id="diceresult"></div>
        <div id="diceimage"></div>
    </div>

    <script>
        function rolldice(){
            const numofdice=document.getElementById("numofdice").value;
            const diceresult=document.getElementById("diceresult");
            const diceimage=document.getElementById("diceimage"); 
            const values=[];
            const images=[];

            for(let i=0;i<numofdice;i++){
                const value= Math.floor(Math.random()*6)+1;
                values.push(value);
                images.push(`<img src="diceImages/${value}.png">`);
            }

            diceresult.innerHTML=`dice:${values.join(', ')}`;
            diceimage.innerHTML=images.join('');

        }
    </script>
</body>
</html>
