<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: hsl(0, 11%, 89%);
        }
        h1{
            color: hsl(240, 76%, 70%);
        }

        form{
            background-color: white;
            text-align: center;
            max-width: 350px;
            margin: auto;
            padding: 25px;
            border-radius: 5px;
            box-shadow: 5px 5px 15px hsla(0, 0%, 0%, 0.3);

        }

        #textbox{
            width: 50%;
            text-align: center;
            font-size: 2em;
            border: 2px solid hsla(0, 0%, 0%, 0.8);
            border-radius: 5px;
            margin-bottom: 15px;
        }

        label{
            font-size: 1.5em;
            font-weight: bold;
        }

        button{
            margin-top: 15px;
            color: white;
            background-color: hsl(0, 100%, 40%);
            font-size: 1.5em;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }

        button:hover{
            background-color: hsl(0, 100%, 50%);
        }

        #result{
            font-size: 1.75em;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <form>
        <h1>Temperature Conversion</h1>
        <input type="number" id="textbox" value=0><br>
        <input type="radio" id="tofaren">
        <label for="tofaren">Celcius ➡️ Farenhite</label><br>
        <input type="radio" id="tocelcius">
        <label for="tocelcius">Farenhite ➡️ Celcius</label><br>
        <button type="button" onclick="convert()">Submit</button>
        <p id="result"></p>
    </form>


    <script>
        const textbox=document.getElementById("textbox");
        const tofaren=document.getElementById("tofaren");
        const tocelcius=document.getElementById("tocelcius");
        const result=document.getElementById("result");
        let temp;

        function convert(){

            if(tofaren.checked){
                temp=Number(textbox.value);
                temp=temp* 9/5 +32;
                result.innerHTML=temp.toFixed(1)+ "°F";
            }
            else if(tocelcius.checked){
                temp=Number(textbox.value);
                temp=(temp-32)* (5/9);
                result.innerHTML=temp.toFixed(1)+ "°C";
            }
            else{
                result.innerHTML="Select a unit"
            }
        }
    </script>
</body>
</html>
